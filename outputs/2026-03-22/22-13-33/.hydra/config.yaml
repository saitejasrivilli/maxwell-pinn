geometry:
  name: cylindrical
  chamber:
    radius: 0.15
    height: 0.3
  coil:
    type: single_turn
    radius: 0.12
    z_center: 0.2
    frequency: 13560000.0
  plasma:
    conductivity_model: uniform
    sigma_0: 10.0
  domain:
    n_interior: 8192
    n_boundary: 2048
    n_interface: 1024
network:
  name: fourier_net
  architecture: FourierNetArch
  n_input: 8
  n_output: 4
  layer_size: 512
  n_layers: 8
  frequencies:
  - 1
  - 2
  - 4
  - 8
  - 16
  frequencies_params:
  - 1
  - 2
  - 4
  activation_fn: silu
  skip_connections: true
physics:
  name: maxwell_te
  mode: TE
  equations:
  - curl_curl_E
  - gauss_law
  pde_loss_weight: 1.0
bc:
  name: hard
  method: ansatz
  delta: 0.005
  bc_loss_weight: 0.0
experiment:
  name: pretrain_cylinder
  seed: 42
  output_dir: outputs/pretrain_cylinder
training:
  max_epochs: 15000
  lr: 0.0001
  lr_decay: 0.95
  lr_decay_steps: 1000
  batch_size: 2048
  log_every: 500
  save_every: 2000
transfer:
  enabled: false
  checkpoint: null
  frozen_blocks: 6
mlflow:
  tracking_uri: mlruns
  experiment_name: ${experiment.name}
